<!DOCTYPE html>

    <style>

        body { background: #0f172a; font-family: 'Poppins', sans-serif; color: white; display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 600px; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        input, textarea, select { width: 100%; padding: 12px; border-radius: 12px; border: none; background: rgba(255,255,255,0.05); color: white; margin-bottom: 10px; box-sizing: border-box; }
        select { cursor: pointer; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #6366f1, #a855f7); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.2s; margin-top: 20px; }
        button:hover { transform: scale(1.02); }
